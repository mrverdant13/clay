# Manual pub.dev publish for clay_core and clay_cli (OIDC via setup-dart).
# Trigger via Actions → Publish Dart package.
#
# Option C two-step flow:
# 1. Merge the release PR — release-tag.yaml pushes <package>/<version> on the merge commit.
# 2. Dispatch this workflow on that tag ref with dry_run: false (Use workflow from: Tags).
#    OIDC auth succeeds on tag refs; publish runs, pub.dev is polled, the release tag is verified.
#    On failure, the release tag is deleted so unpublished versions are not permanently tagged.
#
# dry_run: true (default) runs release.check only — dispatch from main or a tag ref.
# dry_run: false publishes via OIDC — must dispatch on the matching release tag ref.
name: Publish Dart package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - clay_core
          - clay_cli
      dry_run:
        description: Pre-publish gate only via release.check (no pub.dev publish)
        required: true
        type: boolean
        default: true

concurrency:
  cancel-in-progress: false
  group: publish-${{ inputs.package }}

jobs:
  check:
    name: Pre-publish checks (${{ inputs.package }})
    runs-on: ubuntu-latest
    env:
      MELOS_PACKAGES: ${{ inputs.package }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      - name: Install melos
        uses: ./.github/actions/install-dart-cli
        with:
          package: melos 7.5.1
      - name: Bootstrap workspace
        run: melos bs
      - name: Run pre-publish gate
        run: melos run release.check

  publish:
    name: Publish and tag (${{ inputs.package }})
    needs: check
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    environment: pub-dev-publish
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      - name: Install melos
        uses: ./.github/actions/install-dart-cli
        with:
          package: melos 7.5.1
      - name: Bootstrap workspace
        run: melos bs
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Publish to pub.dev
        working-directory: packages/${{ inputs.package }}
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: dart pub publish --force
      - name: Wait for pub.dev to list the published version
        working-directory: packages/${{ inputs.package }}
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          dart run ../../tool/wait_for_pub_dev_version.dart \
            --package ${{ inputs.package }} \
            --version "$version"
      - name: Create annotated release tag
        run: dart run tool/release_tag.dart --package ${{ inputs.package }} --execute
