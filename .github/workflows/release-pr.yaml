# Runs MELOS_PACKAGES-scoped release.check on Dart package release pull requests.
name: Dart release PR check

on:
  pull_request:
    branches:
      - main
    paths:
      - packages/clay_core/pubspec.yaml
      - packages/clay_core/CHANGELOG.md
      - packages/clay_cli/pubspec.yaml
      - packages/clay_cli/CHANGELOG.md

jobs:
  parse-title:
    name: Parse release PR title
    runs-on: ubuntu-latest
    outputs:
      matched: ${{ steps.parse.outputs.matched }}
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse chore(<package>): release <version> title
        id: parse
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          if [[ "$PR_TITLE" =~ ^chore\(([^)]+)\):\ release\ (.+)$ ]]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
            echo "package=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
          fi

  resolve-package:
    name: Resolve release package
    needs: parse-title
    if: needs.parse-title.outputs.matched == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify release manifest changes match title
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TITLE_PACKAGE: ${{ needs.parse-title.outputs.package }}
        run: |
          set -euo pipefail

          case "$TITLE_PACKAGE" in
            clay_core|clay_cli) ;;
            *)
              echo "::error::Unknown publishable package '$TITLE_PACKAGE'. Expected clay_core or clay_cli."
              exit 1
              ;;
          esac

          core_changed=false
          cli_changed=false

          while IFS= read -r file; do
            case "$file" in
              packages/clay_core/pubspec.yaml|packages/clay_core/CHANGELOG.md)
                core_changed=true
                ;;
              packages/clay_cli/pubspec.yaml|packages/clay_cli/CHANGELOG.md)
                cli_changed=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [[ "$core_changed" == true && "$cli_changed" == true ]]; then
            echo "::error::Release PRs must change exactly one publishable package. Both clay_core and clay_cli release manifests were modified. Split into separate release PRs — see CONTRIBUTING.md."
            exit 1
          fi

          if [[ "$core_changed" == true ]]; then
            changed_package=clay_core
          elif [[ "$cli_changed" == true ]]; then
            changed_package=clay_cli
          else
            echo "::error::No release manifest changes detected in this pull request."
            exit 1
          fi

          if [[ "$changed_package" != "$TITLE_PACKAGE" ]]; then
            echo "::error::Release manifest changes target $changed_package but the PR title indicates $TITLE_PACKAGE."
            exit 1
          fi

  release-check:
    name: release.check (${{ needs.parse-title.outputs.package }} ${{ needs.parse-title.outputs.version }})
    needs: [parse-title, resolve-package]
    if: needs.parse-title.outputs.matched == 'true'
    runs-on: ubuntu-latest
    env:
      MELOS_PACKAGES: ${{ needs.parse-title.outputs.package }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      - name: Install melos
        uses: ./.github/actions/install-dart-cli
        with:
          package: melos 7.5.1
      - name: Bootstrap workspace
        run: melos bs
      - name: Run pre-publish gate
        run: melos run release.check
