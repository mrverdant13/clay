# Runs MELOS_PACKAGES-scoped release.check on Dart package release pull requests.
name: Dart release PR check

on:
  pull_request:
    branches:
      - main
    paths:
      - packages/clay_core/pubspec.yaml
      - packages/clay_core/CHANGELOG.md
      - packages/clay_cli/pubspec.yaml
      - packages/clay_cli/CHANGELOG.md

jobs:
  resolve-package:
    name: Resolve release package
    runs-on: ubuntu-latest
    if: |
      startsWith(github.event.pull_request.title, 'chore(clay_core): release') ||
      startsWith(github.event.pull_request.title, 'chore(clay_cli): release')
    outputs:
      package: ${{ steps.resolve.outputs.package }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve scoped publishable package
        id: resolve
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          core_changed=false
          cli_changed=false

          while IFS= read -r file; do
            case "$file" in
              packages/clay_core/pubspec.yaml|packages/clay_core/CHANGELOG.md)
                core_changed=true
                ;;
              packages/clay_cli/pubspec.yaml|packages/clay_cli/CHANGELOG.md)
                cli_changed=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [[ "$core_changed" == true && "$cli_changed" == true ]]; then
            echo "::error::Release PRs must change exactly one publishable package. Both clay_core and clay_cli release manifests were modified. Split into separate release PRs — see CONTRIBUTING.md."
            exit 1
          fi

          if [[ "$core_changed" == true ]]; then
            package=clay_core
          elif [[ "$cli_changed" == true ]]; then
            package=clay_cli
          else
            echo "::error::No release manifest changes detected in this pull request."
            exit 1
          fi

          case "$PR_TITLE" in
            "chore(clay_core): release"*)
              title_package=clay_core
              ;;
            "chore(clay_cli): release"*)
              title_package=clay_cli
              ;;
            *)
              echo "::error::PR title must start with 'chore(clay_core): release' or 'chore(clay_cli): release'."
              exit 1
              ;;
          esac

          if [[ "$package" != "$title_package" ]]; then
            echo "::error::Release manifest changes target $package but the PR title indicates $title_package."
            exit 1
          fi

          echo "package=$package" >> "$GITHUB_OUTPUT"
