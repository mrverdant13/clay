# Local pub.dev score checks for publishable workspace packages.
#
# Threshold 35 (pub-score.local): pre-release gaps until publish PRs land —
# missing LICENSE and README, no example, and publish_to: none in pubspec.yaml.
name: Check local Pub.dev score

on:
  pull_request:
    branches:
      - main
    paths:
      - packages/clay_core/**
      - packages/clay_cli/**
      - pubspec.yaml
      - pubspec.lock
      - .github/workflows/check_local_pub_score.yaml
  push:
    branches:
      - main
    paths:
      - packages/clay_core/**
      - packages/clay_cli/**
      - pubspec.yaml
      - pubspec.lock
      - .github/workflows/check_local_pub_score.yaml
  workflow_dispatch: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check-local-pub-score:
    name: Check local Pub.dev score
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      - name: Install melos
        run: dart pub global activate melos 7.5.1
      - name: Bootstrap workspace
        run: melos bs
      - name: Verify local Pub.dev score
        run: melos run pub-score.local
      - name: Set step summary
        if: always()
        run: |
          for package in clay clay_cli; do
            report="packages/${package}/.dart_tool/local_pub_score.md"
            if [[ -f "$report" ]]; then
              echo "### ${package}" >> "$GITHUB_STEP_SUMMARY"
              cat "$report" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
