name: clay_cli
description: >-
  A toolchain for authoring Mason brick templates from reference projects.
version: 0.0.1
publish_to: none
homepage: https://github.com/mrverdant13/clay
repository: https://github.com/mrverdant13/clay/tree/main/packages/clay_cli
issue_tracker: https://github.com/mrverdant13/clay/issues
topics:
  - mason
  - template
  - codegen
  - cli
  - annotations
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  args: ^2.7.0
  clay_core:
    path: ../clay_core
  mason_logger: ^0.3.3
  meta: ^1.18.0
  path: ^1.9.1

dev_dependencies:
  mocktail: ^1.0.5
  test: ^1.31.1
  very_good_analysis: ^10.0.0

executables:
  clay:
