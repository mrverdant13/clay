name: clay_monorepo

environment:
  sdk: ">=3.5.0 <4.0.0"

dev_dependencies:
  coverde: ^0.4.0
  melos: ^7.5.1
  pub_score_checker:
    git:
      url: https://github.com/mrverdant13/pub_score_checker.git
      ref: 526653ebf1ea09b3376550edc0ce03a153ca62f2
  very_good_analysis: ^10.0.0

melos:
  categories:
    e2e:
      - packages/clay_core/e2e
      - packages/clay_cli/e2e
    publishable:
      - packages/clay_core
      - packages/clay_cli

  repository: https://github.com/mrverdant13/clay

  command:
    bootstrap:
      environment:
        sdk: ">=3.5.0 <4.0.0"
    version:
      branch: main
      includeScopes: false
      updateGitTagRefs: false
      workspaceChangelog: false
      fetchTags: false
      message: |
        chore(release): publish packages

        {new_package_versions}
      hooks:
        preCommit: dart run tool/sync_package_version.dart --package clay_core && dart run tool/sync_package_version.dart --package clay_cli && git add packages/clay_core/lib/src/version.dart packages/clay_cli/lib/src/version.dart

  scripts:
    format:
      description: Format a package
      run: dart format .
      exec:
        concurrency: 1
        orderDependents: true
    format.ci:
      description: Format all packages (CI)
      run: dart format --set-exit-if-changed .

    analyze:
      description: Analyze a package
      run: dart analyze .
      exec:
        concurrency: 1
        orderDependents: true
    analyze.ci:
      description: Analyze all packages (CI)
      run: dart analyze --fatal-infos --fatal-warnings .

    test:
      description: Run tests for a package
      run: >
        dart run
        coverde
        optimize-tests
        --include 'test/**_test.dart'
        --output test/optimized_test.dart
        &&
        dart test
        --color
        --coverage-path coverage/lcov.info
        --coverage-package MELOS_PACKAGE_NAME
        --exclude-tags ci-only
        --reporter expanded
        --test-randomize-ordering-seed random
        test/optimized_test.dart
      exec:
        concurrency: 1
        orderDependents: true
      packageFilters:
        dependsOn:
          - test
        dirExists:
          - test
    test.all:
      description: Run tests for all packages
      steps:
        - test
    test.ci:
      description: Run tests for all packages (CI)
      run: >
        melos exec
        --depends-on test
        --dir-exists test
        --fail-fast
        --order-dependents
        --
        "
        dart run
        coverde
        optimize-tests
        --include 'test/**_test.dart'
        --output test/optimized_test.dart
        &&
        dart test
        --coverage-path coverage/lcov.info
        --coverage-package MELOS_PACKAGE_NAME
        --exclude-tags ci-only
        --reporter expanded
        --test-randomize-ordering-seed random
        test/optimized_test.dart
         "
    coverage.merge:
      description: Merge all packages coverage trace files
      run: >
        dart run
        coverde
        rm
        --no-dry-run
        MELOS_ROOT_PATH/coverage/filtered.lcov.info
        &&
        melos exec
        --file-exists coverage/lcov.info
        --
        "
        dart run
        coverde
        transform
        --input coverage/lcov.info
        --output MELOS_ROOT_PATH/coverage/filtered.lcov.info
        --transformations relative=MELOS_ROOT_PATH
        "
    coverage.check:
      description: Check test coverage
      run: >
        dart run coverde check --input
        MELOS_ROOT_PATH/coverage/filtered.lcov.info 100

    test.e2e:
      description: Run E2E tests
      run: >
        dart run
        coverde
        optimize-tests
        --include 'e2e/**_test.dart'
        --output e2e/optimized_test.dart
        &&
        dart test
        --color
        --tags e2e
        --reporter expanded
        --test-randomize-ordering-seed random
        e2e/optimized_test.dart
      exec:
        concurrency: 1
      packageFilters:
        category:
          - e2e
        dirExists:
          - e2e
    test.e2e.all:
      description: Run E2E tests for all packages
      steps:
        - test.e2e
    test.e2e.ci:
      description: Run E2E tests for all packages (CI)
      run: >
        melos exec
        --category e2e
        --dir-exists e2e
        --fail-fast
        --order-dependents
        --
        "
        dart run
        coverde
        optimize-tests
        --include 'e2e/**_test.dart'
        --output e2e/optimized_test.dart
        &&
        dart test
        --tags e2e
        --reporter expanded
        --test-randomize-ordering-seed random
        e2e/optimized_test.dart
        "

    pub-score.local:
      description: Check local pub.dev score for publishable packages
      run: >
        dart run pub_score_checker check_pub_score local
        --markdown-output MELOS_PACKAGE_PATH/.dart_tool/local_pub_score.md
        --package-path MELOS_PACKAGE_PATH
        --threshold 10
      exec:
        concurrency: 1
      packageFilters:
        category:
          - publishable
    pub-score.remote:
      description: Check remote pub.dev score for publishable packages
      run: >
        dart run pub_score_checker check_pub_score remote
        --markdown-output MELOS_PACKAGE_PATH/.dart_tool/remote_pub_score.md
        --package-name MELOS_PACKAGE_NAME
        --threshold 10
      exec:
        concurrency: 1
      packageFilters:
        category:
          - publishable

    release.check:
      description: >
        Pre-publish gate — format, analyze, test, pub score, and publish
        dry-run for all publishable packages
      steps:
        - format.ci
        - analyze.ci
        - test.ci
        - pub-score.local
        - melos publish --dry-run --category publishable --no-select
    release.check.core:
      description: Pre-publish gate scoped to clay_core
      steps:
        - format.ci
        - analyze.ci
        - test.ci
        - melos run pub-score.local --scope=clay_core --no-select
        - melos publish --dry-run --scope=clay_core --no-select
    release.check.cli:
      description: Pre-publish gate scoped to clay_cli
      steps:
        - format.ci
        - analyze.ci
        - test.ci
        - melos run pub-score.local --scope=clay_cli --no-select
        - melos publish --dry-run --scope=clay_cli --no-select

    release.prepare:
      description: >
        Bump version and changelog for a package release. Pass melos version
        flags after -- (e.g. --scope=clay_core --manual-version=clay_core:build)
      run: melos version --no-git-tag-version --no-dependent-versions --preid=dev

workspace:
  - packages/clay_core/
  - packages/clay_core/e2e/
  - packages/clay_cli/
  - packages/clay_cli/e2e/
